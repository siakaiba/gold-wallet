<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samir's Gold Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-4 font-sans text-gray-900">
    <div class="max-w-7xl mx-auto">
        <header class="bg-yellow-600 text-white p-6 rounded-t-xl shadow-lg flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold uppercase tracking-tight">Gold Investment Wallet</h1>
                <p class="text-yellow-100">Live 24K Price (Qatar): <span class="font-bold">599.50 QAR/g</span></p>
            </div>
            <div class="mt-4 md:mt-0">
                <button onclick="downloadPDF()" class="bg-white text-yellow-700 px-4 py-2 rounded-lg font-bold shadow hover:bg-yellow-50 transition">Download PDF Report</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-5 bg-white border-x p-6 gap-3 border-b">
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Total Purchases</p>
                <p id="statCount" class="text-xl font-black text-blue-700">0</p>
            </div>
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Total Weight</p>
                <p id="statGrams" class="text-xl font-black text-gray-800">0.00g</p>
            </div>
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Total Investment</p>
                <p id="statInvested" class="text-xl font-black text-gray-700">QAR 0</p>
            </div>
            <div id="cardValue" class="p-4 rounded-lg border shadow-sm transition-colors duration-500 bg-gray-50 border-gray-200">
                <p id="labelValue" class="text-[10px] uppercase font-bold text-gray-500">Investment Value</p>
                <p id="statValue" class="text-xl font-black">QAR 0</p>
            </div>
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Net Profit/Loss</p>
                <p id="statProfit" class="text-xl font-black">QAR 0</p>
            </div>
        </div>

        <div class="bg-white p-6 shadow-md border-x">
            <div class="grid grid-cols-1 md:grid-cols-6 gap-3">
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-1">Date</label>
                    <input type="date" id="purchaseDate" class="border p-2 rounded text-sm outline-none">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-1">Type</label>
                    <select id="purity" class="border p-2 rounded text-sm outline-none bg-white">
                        <option value="24">24K (Pure)</option>
                        <option value="22">22K</option>
                        <option value="21">21K</option>
                        <option value="18">18K</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-1">Grams</label>
                    <input type="number" id="grams" placeholder="Weight" class="border p-2 rounded text-sm outline-none">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-1">Price/g (Optional)</label>
                    <input type="number" id="price" placeholder="Unknown = 0" class="border p-2 rounded text-sm outline-none">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-400 uppercase mb-1">Making (Optional)</label>
                    <input type="number" id="costs" placeholder="Unknown = 0" class="border p-2 rounded text-sm outline-none">
                </div>
                <div class="flex flex-col justify-end">
                    <button onclick="addEntry()" class="bg-yellow-600 text-white h-10 rounded font-bold hover:bg-yellow-700 transition uppercase text-xs">Add Entry</button>
                </div>
            </div>
        </div>

        <div class="bg-white shadow-md rounded-b-xl overflow-x-auto text-sm border-x border-b">
            <table class="w-full text-left border-collapse" id="reportTable">
                <thead class="bg-gray-100 text-gray-700 uppercase font-bold text-[10px]">
                    <tr>
                        <th class="p-4 border-b">Date</th>
                        <th class="p-4 border-b">Type</th>
                        <th class="p-4 border-b text-center">Weight</th>
                        <th class="p-4 border-b text-center">Total Cost</th>
                        <th class="p-4 border-b text-center">Current Val.</th>
                        <th class="p-4 border-b text-center">Profit (%)</th>
                        <th class="p-4 border-b text-center">Profit (QAR)</th>
                        <th class="p-4 border-b text-right no-pdf">Action</th>
                    </tr>
                </thead>
                <tbody id="goldTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const livePrice24K = 599.50;

        window.onload = function() {
            document.getElementById('purchaseDate').valueAsDate = new Date();
            loadEntries();
        };

        function addEntry() {
            const rawDate = document.getElementById('purchaseDate').value;
            const purity = parseInt(document.getElementById('purity').value);
            const grams = parseFloat(document.getElementById('grams').value) || 0;
            const price = parseFloat(document.getElementById('price').value) || 0;
            const costs = parseFloat(document.getElementById('costs').value) || 0;
            
            if(!rawDate || grams <= 0) return alert("Please enter the Date and Grams!");

            const selectedDate = new Date(rawDate);
            const totalCost = (grams * price) + costs;

            const entry = {
                id: Date.now(),
                timestamp: selectedDate.getTime(), // Added for sorting
                dateStr: selectedDate.toLocaleDateString('en-GB'),
                day: selectedDate.toLocaleDateString('en-US', { weekday: 'long' }),
                purity: purity,
                grams: grams,
                buyPrice: price,
                makingCosts: costs,
                totalCost: totalCost
            };

            let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
            entries.push(entry);
            localStorage.setItem('goldEntries', JSON.stringify(entries));
            loadEntries();

            document.getElementById('grams').value = '';
            document.getElementById('price').value = '';
            document.getElementById('costs').value = '';
        }

        function loadEntries() {
            const tableBody = document.getElementById('goldTable');
            tableBody.innerHTML = '';
            let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
            
            let totalGrams = 0, totalInvested = 0, currentPortfolioValue = 0;

            // CRITICAL: Sorting by Date (Latest on Top)
            // We use 'timestamp' if it exists, or 'id' as a fallback
            entries.sort((a, b) => (b.timestamp || b.id) - (a.timestamp || a.id));

            entries.forEach(entry => {
                const purityFactor = entry.purity / 24;
                const currentUnitPrice = livePrice24K * purityFactor;
                const currentVal = entry.grams * currentUnitPrice;
                const profitVal = currentVal - entry.totalCost;
                const profitPct = entry.totalCost > 0 ? ((profitVal / entry.totalCost) * 100).toFixed(1) : "---";

                totalGrams += entry.grams;
                totalInvested += entry.totalCost;
                currentPortfolioValue += currentVal;

                const colorClass = profitVal >= 0 && entry.totalCost > 0 ? 'text-green-600' : (entry.totalCost > 0 ? 'text-red-600' : 'text-gray-400');
                
                tableBody.innerHTML += `
                    <tr class="hover:bg-gray-50 border-b">
                        <td class="p-4 font-medium">${entry.dateStr}</td>
                        <td class="p-4 font-bold text-yellow-700">${entry.purity}K</td>
                        <td class="p-4 text-center font-bold">${entry.grams}g</td>
                        <td class="p-4 text-center">${entry.totalCost > 0 ? 'QAR ' + entry.totalCost.toLocaleString() : 'Unknown'}</td>
                        <td class="p-4 text-center font-semibold">QAR ${currentVal.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
                        <td class="p-4 text-center font-bold ${colorClass}">${profitPct}${profitPct !== "---" ? "%" : ""}</td>
                        <td class="p-4 text-center font-bold ${colorClass}">${entry.totalCost > 0 ? 'QAR ' + profitVal.toLocaleString(undefined, {minimumFractionDigits: 1}) : '---'}</td>
                        <td class="p-4 text-right no-pdf">
                            <button class="text-red-400 font-bold hover:text-red-600" onclick="deleteEntry(${entry.id})">Delete</button>
                        </td>
                    </tr>`;
            });

            const totalProfit = currentPortfolioValue - totalInvested;

            // Summary UI
            document.getElementById('statCount').innerText = entries.length;
            document.getElementById('statGrams').innerText = totalGrams.toFixed(2) + 'g';
            document.getElementById('statInvested').innerText = 'QAR ' + totalInvested.toLocaleString();
            document.getElementById('statValue').innerText = 'QAR ' + currentPortfolioValue.toLocaleString(undefined, {maximumFractionDigits:0});
            document.getElementById('statProfit').innerText = 'QAR ' + totalProfit.toLocaleString(undefined, {minimumFractionDigits: 0});
            
            // Dynamic Color Logic
            const cardValue = document.getElementById('cardValue');
            const statProfit = document.getElementById('statProfit');
            
            if (currentPortfolioValue > totalInvested && totalInvested > 0) {
                cardValue.className = "bg-green-50 p-4 rounded-lg border border-green-200 shadow-sm";
                statProfit.className = "text-xl font-black text-green-600";
            } else if (currentPortfolioValue < totalInvested) {
                cardValue.className = "bg-red-50 p-4 rounded-lg border border-red-200 shadow-sm";
                statProfit.className = "text-xl font-black text-red-600";
            } else {
                cardValue.className = "bg-gray-50 p-4 rounded-lg border border-gray-200 shadow-sm";
                statProfit.className = "text-xl font-black text-gray-800";
            }
        }

        function deleteEntry(id) {
            let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
            entries = entries.filter(e => e.id !== id);
            localStorage.setItem('goldEntries', JSON.stringify(entries));
            loadEntries();
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text("Gold Investment Report", 14, 15);
            doc.autoTable({ html: '#reportTable', startY: 25, didParseCell: (d) => { if(d.column.index === 7) d.cell.text = ''; } });
            doc.save("Gold_Report.pdf");
        }
    </script>
</body>
</html>
