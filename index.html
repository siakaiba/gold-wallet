<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samir's Gold Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Force the body to take full screen and hide global scrollbars */
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
        }
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }
        /* Custom scrollbar for the table area only */
        .table-scroll::-webkit-scrollbar { width: 6px; }
        .table-scroll::-webkit-scrollbar-track { background: #f1f1f1; }
        .table-scroll::-webkit-scrollbar-thumb { background: #ca8a04; border-radius: 10px; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900">

    <div class="app-container">
        <header class="bg-yellow-600 text-white px-6 py-3 shadow-md flex justify-between items-center shrink-0">
            <div>
                <h1 class="text-xl font-bold uppercase tracking-tight leading-none">Gold Investment Wallet</h1>
                <p class="text-yellow-100 text-[10px] mt-1">Live 24K Price (Qatar): <span class="font-bold">599.50 QAR/g</span></p>
            </div>
            <button onclick="downloadPDF()" class="bg-white text-yellow-700 px-4 py-1.5 rounded-lg font-bold shadow hover:bg-yellow-50 transition text-xs">Download PDF</button>
        </header>

        <div class="grid grid-cols-5 bg-white border-b px-4 py-2 gap-2 text-center shrink-0">
            <div class="bg-gray-50 p-2 rounded-lg border border-gray-200">
                <p class="text-[8px] text-gray-500 uppercase font-bold">Purchases</p>
                <p id="statCount" class="text-base font-black text-gray-800">0</p>
            </div>
            <div class="bg-gray-50 p-2 rounded-lg border border-gray-200">
                <p class="text-[8px] text-gray-500 uppercase font-bold">Total Weight</p>
                <p id="statGrams" class="text-base font-black text-gray-800">0.00g</p>
            </div>
            <div class="bg-gray-50 p-2 rounded-lg border border-gray-200">
                <p class="text-[8px] text-gray-500 uppercase font-bold">Investment</p>
                <p id="statInvested" class="text-base font-black text-gray-700">QAR 0</p>
            </div>
            <div id="cardValue" class="p-2 rounded-lg border shadow-sm bg-gray-50 border-gray-200">
                <p class="text-[8px] uppercase font-bold text-gray-500">Portfolio Value</p>
                <p id="statValue" class="text-base font-black text-gray-800">QAR 0</p>
            </div>
            <div id="cardProfit" class="p-2 rounded-lg border shadow-sm bg-gray-50 border-gray-200">
                <p class="text-[8px] uppercase font-bold text-gray-500">Profit/Loss</p>
                <p id="statProfit" class="text-base font-black text-gray-800">QAR 0</p>
            </div>
        </div>

        <div class="bg-white border-b shrink-0">
            <div class="flex h-[240px]">
                <div class="flex-1 p-4 border-r">
                    <div class="flex justify-between items-center mb-2">
                        <h2 class="text-[10px] font-bold text-gray-700 uppercase tracking-wider">Market Trend</h2>
                        <div class="flex gap-1 bg-gray-100 p-0.5 rounded">
                            <button onclick="updateLineChart('1W')" class="px-2 py-0.5 text-[8px] font-bold rounded hover:bg-white">1W</button>
                            <button onclick="updateLineChart('1M')" class="px-2 py-0.5 text-[8px] font-bold bg-white shadow-sm rounded">1M</button>
                        </div>
                    </div>
                    <div class="h-[180px]"><canvas id="goldChart"></canvas></div>
                </div>
                
                <div class="w-[300px] p-4 border-r">
                    <h2 class="text-[10px] font-bold text-gray-700 uppercase tracking-wider mb-2">Breakdown</h2>
                    <div class="h-[180px]"><canvas id="weightDonut"></canvas></div>
                </div>

                <div class="w-[350px] p-4 bg-gray-50">
                    <h2 class="text-[10px] font-bold text-gray-700 uppercase tracking-wider mb-3">Add Purchase</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="date" id="purchaseDate" class="border p-1.5 rounded text-[10px] outline-none w-full">
                        <select id="purity" class="border p-1.5 rounded text-[10px] bg-white outline-none w-full">
                            <option value="24">24K</option><option value="22">22K</option>
                            <option value="21">21K</option><option value="18">18K</option>
                        </select>
                        <input type="number" id="grams" placeholder="Grams" class="border p-1.5 rounded text-[10px] outline-none w-full">
                        <input type="number" id="price" placeholder="Price/g" class="border p-1.5 rounded text-[10px] outline-none w-full">
                        <input type="number" id="costs" placeholder="Making" class="border p-1.5 rounded text-[10px] outline-none col-span-2 w-full">
                        <button onclick="addEntry()" class="bg-yellow-600 text-white p-2 rounded font-bold hover:bg-yellow-700 transition uppercase text-[10px] col-span-2">Add Entry</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto table-scroll bg-white">
            <table class="w-full text-left border-collapse" id="reportTable">
                <thead class="bg-gray-100 text-gray-700 uppercase font-bold text-[9px] sticky top-0 z-10 shadow-sm">
                    <tr>
                        <th class="p-3 border-b">Date</th>
                        <th class="p-3 border-b">Type</th>
                        <th class="p-3 border-b text-center">Weight</th>
                        <th class="p-3 border-b text-center">Cost</th>
                        <th class="p-3 border-b text-center">Valuation</th>
                        <th class="p-3 border-b text-center">Profit %</th>
                        <th class="p-3 border-b text-center">Profit (QAR)</th>
                        <th class="p-3 border-right no-pdf text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="goldTable" class="text-[11px]"></tbody>
            </table>
        </div>
    </div>

    <script>
        const livePrice24K = 599.50;
        let lineChart, donutChart;

        window.onload = function() {
            document.getElementById('purchaseDate').valueAsDate = new Date();
            initCharts();
            loadEntries();
        };

        function initCharts() {
            const lineCtx = document.getElementById('goldChart').getContext('2d');
            lineChart = new Chart(lineCtx, {
                type: 'line',
                data: {
                    labels: ['W1', 'W2', 'W3', 'Today'],
                    datasets: [{
                        data: [580, 592, 588, 599.50],
                        borderColor: '#ca8a04',
                        backgroundColor: 'rgba(202, 138, 4, 0.1)',
                        fill: true, tension: 0.4, pointRadius: 2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            const donutCtx = document.getElementById('weightDonut').getContext('2d');
            donutChart = new Chart(donutCtx, {
                type: 'doughnut',
                data: {
                    labels: ['24K', '22K', '21K', '18K'],
                    datasets: [{
                        data: [0, 0, 0, 0],
                        backgroundColor: ['#ca8a04', '#eab308', '#facc15', '#fef08a'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'right', labels: { boxWidth: 8, font: { size: 9 } } } },
                    cutout: '75%'
                }
            });
        }

        function updateLineChart(range) {
            const dataMap = { '1W': [590, 595, 592, 599.5], '1M': [580, 592, 588, 599.5] };
            lineChart.data.datasets[0].data = dataMap[range];
            lineChart.update();
        }

        function addEntry() {
            const rawDate = document.getElementById('purchaseDate').value;
            const purity = parseInt(document.getElementById('purity').value);
            const grams = parseFloat(document.getElementById('grams').value) || 0;
            const price = parseFloat(document.getElementById('price').value) || 0;
            const costs = parseFloat(document.getElementById('costs').value) || 0;
            if(!rawDate || grams <= 0) return alert("Fill data!");

            const totalCost = (grams * price) + costs;
            const entry = { id: Date.now(), timestamp: new Date(rawDate).getTime(), dateStr: new Date(rawDate).toLocaleDateString('en-GB'), purity, grams, totalCost };
            let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
            entries.push(entry);
            localStorage.setItem('goldEntries', JSON.stringify(entries));
            loadEntries();
            document.getElementById('grams').value = '';
        }

        function loadEntries() {
            const tableBody = document.getElementById('goldTable');
            tableBody.innerHTML = '';
            let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
            const weights = { 24: 0, 22: 0, 21: 0, 18: 0 };
            let tGrams = 0, tCost = 0, tVal = 0;

            entries.sort((a, b) => b.timestamp - a.timestamp);
            entries.forEach(e => {
                const currentVal = e.grams * (livePrice24K * (e.purity / 24));
                const profitVal = currentVal - e.totalCost;
                const profitPct = e.totalCost > 0 ? ((profitVal / e.totalCost) * 100).toFixed(1) : "---";
                weights[e.purity] += e.grams;
                tGrams += e.grams; tCost += e.totalCost; tVal += currentVal;

                const color = profitVal >= 0 ? 'text-green-600' : 'text-red-600';
                tableBody.innerHTML += `<tr class="hover:bg-gray-50 border-b">
                    <td class="p-3">${e.dateStr}</td><td class="p-3 font-bold">${e.purity}K</td>
                    <td class="p-3 text-center">${e.grams}g</td><td class="p-3 text-center">${e.totalCost.toLocaleString()}</td>
                    <td class="p-3 text-center">${currentVal.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
                    <td class="p-3 text-center font-bold ${color}">${profitPct}%</td>
                    <td class="p-3 text-center font-bold ${color}">${profitVal.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
                    <td class="p-3 text-right"><button class="text-red-400" onclick="deleteEntry(${e.id})">Del</button></td></tr>`;
            });

            document.getElementById('statCount').innerText = entries.length;
            document.getElementById('statGrams').innerText = tGrams.toFixed(2) + 'g';
            document.getElementById('statInvested').innerText = 'QAR ' + tCost.toLocaleString();
            document.getElementById('statValue').innerText = 'QAR ' + tVal.toLocaleString(undefined, {maximumFractionDigits:0});
            document.getElementById('statProfit').innerText = 'QAR ' + (tVal - tCost).toLocaleString(undefined, {maximumFractionDigits: 0});
            
            updateCardColors(tVal, tCost);
            donutChart.data.datasets[0].data = [weights[24], weights[22], weights[21], weights[18]];
            donutChart.update();
        }

        function updateCardColors(tVal, tCost) {
            const cardP = document.getElementById('cardProfit');
            if (tVal > tCost) cardP.className = "p-2 rounded-lg border shadow-sm bg-green-50 border-green-200";
            else if (tVal < tCost) cardP.className = "p-2 rounded-lg border shadow-sm bg-red-50 border-red-200";
        }

        function deleteEntry(id) {
            if(confirm("Delete entry?")) {
                let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
                entries = entries.filter(e => e.id !== id);
                localStorage.setItem('goldEntries', JSON.stringify(entries));
                loadEntries();
            }
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text("Gold Investment Report", 14, 15);
            doc.autoTable({ html: '#reportTable', startY: 20 });
            doc.save("Gold_Report.pdf");
        }
    </script>
</body>
</html>
