<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Investment Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white font-sans">

    <div class="bg-yellow-600 p-4 shadow-lg text-center border-b border-yellow-500">
        <h1 class="text-3xl font-extrabold uppercase tracking-tight mb-2">Gold Investment Wallet</h1>
        <div class="flex justify-center space-x-8 text-sm md:text-base font-bold">
            <div>24K: <span id="price-24k" class="underline decoration-white/50">Loading...</span></div>
            <div>22K: <span id="price-22k" class="underline decoration-white/50">Loading...</span></div>
            <div>21K: <span id="price-21k" class="underline decoration-white/50">Loading...</span></div>
        </div>
        <p class="text-[10px] mt-2 opacity-70 italic" id="last-updated">Updating market data...</p>
    </div>

    <main class="max-w-4xl mx-auto p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <p class="text-gray-400 text-sm">Total Weight</p>
                <h2 class="text-2xl font-bold">0.00g</h2>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <p class="text-gray-400 text-sm">Portfolio Value (USD)</p>
                <h2 class="text-2xl font-bold text-green-400">$0.00</h2>
            </div>
            <div class="bg-gray-800 p-4 rounded-xl border border-gray-700">
                <p class="text-gray-400 text-sm">Live Gain/Loss</p>
                <h2 class="text-2xl font-bold text-yellow-500">0.0%</h2>
            </div>
        </div>

        <section class="bg-gray-800 rounded-2xl p-6 border border-gray-700">
            <h3 class="text-xl font-semibold mb-4">Your Gold Assets</h3>
            <p class="text-gray-500 italic">Integration with Firebase database active...</p>
        </section>
    </main>

    <script>
        // CONFIGURATION - Replace with your key from metalpriceapi.com
        const API_KEY = 'YOUR_ACTUAL_API_KEY_HERE';
        const BASE_URL = 'https://api.metalpriceapi.com/v1/latest';
        const TROY_OUNCE_TO_GRAM = 31.1034768;

        async function fetchRealTimeGold() {
            const price24kEl = document.getElementById('price-24k');
            const price22kEl = document.getElementById('price-22k');
            const price21kEl = document.getElementById('price-21k');
            const updateTimeEl = document.getElementById('last-updated');

            try {
                const response = await fetch(`${BASE_URL}?api_key=${API_KEY}&base=USD&currencies=XAU`);
                const data = await response.json();

                if (data.success && data.rates && data.rates.USDXAU) {
                    // MetalpriceAPI usually returns USDXAU (Price of 1 Ounce in USD)
                    const pricePerOunce = data.rates.USDXAU;
                    
                    // Convert to Price Per Gram (24k)
                    const gramPrice24k = pricePerOunce / TROY_OUNCE_TO_GRAM;

                    // Calculate other carats
                    const gramPrice22k = gramPrice24k * (22 / 24);
                    const gramPrice21k = gramPrice24k * (21 / 24);

                    // Update UI
                    price24kEl.innerText = `${gramPrice24k.toFixed(2)} USD`;
                    price22kEl.innerText = `${gramPrice22k.toFixed(2)} USD`;
                    price21kEl.innerText = `${gramPrice21k.toFixed(2)} USD`;
                    
                    const now = new Date();
                    updateTimeEl.innerText = `Last Updated: ${now.toLocaleTimeString()} (Real-time via MetalpriceAPI)`;
                } else {
                    throw new Error("API Limit reached or Invalid Key");
                }
            } catch (error) {
                console.error("Price Fetch Error:", error);
                price24kEl.innerText = "Error";
                price22kEl.innerText = "Error";
                price21kEl.innerText = "Error";
                updateTimeEl.innerText = "Check API Key or Monthly Quota.";
            }
        }

        // Initialize and set refresh interval (Every 30 mins to save API credits)
        fetchRealTimeGold();
        setInterval(fetchRealTimeGold, 1800000); 
    </script>
</body>
</html>
