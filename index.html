<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samir's Gold Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body { height: 100%; margin: 0; overflow: hidden; }
        .dashboard-container { height: 100vh; display: flex; flex-direction: column; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900">

    <div class="dashboard-container">
        <header class="bg-yellow-600 text-white px-6 py-2 shadow-md flex justify-between items-center shrink-0">
            <div>
                <h1 class="text-lg font-bold uppercase tracking-tight">Gold Investment Wallet</h1>
                <p class="text-yellow-100 text-[10px]">Live 24K Price (Qatar): <span class="font-bold">599.50 QAR/g</span></p>
            </div>
            <button onclick="downloadPDF()" class="bg-white text-yellow-700 px-3 py-1 rounded-lg text-[10px] font-bold shadow hover:bg-yellow-50 transition">PDF Report</button>
        </header>

        <div class="grid grid-cols-5 bg-white border-b px-6 py-2 gap-2 text-center shrink-0">
            <div class="bg-gray-50 p-1.5 rounded border border-gray-200">
                <p class="text-[8px] text-gray-500 uppercase font-bold">Purchases</p>
                <p id="statCount" class="text-sm font-black text-gray-800">0</p>
            </div>
            <div class="bg-gray-50 p-1.5 rounded border border-gray-200">
                <p class="text-[8px] text-gray-500 uppercase font-bold">Total Weight</p>
                <p id="statGrams" class="text-sm font-black text-gray-800">0.00g</p>
            </div>
            <div class="bg-gray-50 p-1.5 rounded border border-gray-200">
                <p class="text-[8px] text-gray-500 uppercase font-bold">Investment</p>
                <p id="statInvested" class="text-sm font-black text-gray-700">QAR 0</p>
            </div>
            <div id="cardValue" class="p-1.5 rounded border bg-gray-50 border-gray-200">
                <p class="text-[8px] uppercase font-bold text-gray-500">Value</p>
                <p id="statValue" class="text-sm font-black text-gray-800">QAR 0</p>
            </div>
            <div id="cardProfit" class="p-1.5 rounded border bg-gray-50 border-gray-200">
                <p class="text-[8px] uppercase font-bold text-gray-500">Profit/Loss</p>
                <p id="statProfit" class="text-sm font-black text-gray-800">QAR 0</p>
            </div>
        </div>

        <div class="flex-none bg-white border-b px-6 py-2">
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
                <div class="lg:col-span-2">
                    <div class="flex justify-between items-center mb-1">
                        <h2 class="text-[10px] font-bold text-gray-700 uppercase">Market Trend</h2>
                        <div class="flex gap-1">
                            <button onclick="updateLineChart('1D')" class="px-2 py-0.5 text-[8px] font-bold border rounded hover:bg-gray-50">1D</button>
                            <button onclick="updateLineChart('1M')" class="px-2 py-0.5 text-[8px] font-bold bg-yellow-600 text-white rounded">1M</button>
                        </div>
                    </div>
                    <div style="height: 140px;"><canvas id="goldChart"></canvas></div>
                </div>
                
                <div class="border-l lg:pl-4 text-center">
                    <h2 class="text-[10px] font-bold text-gray-700 uppercase mb-1">Allocation</h2>
                    <div style="height: 140px;"><canvas id="weightDonut"></canvas></div>
                </div>

                <div class="border-l lg:pl-4 space-y-2">
                    <h2 class="text-[10px] font-bold text-gray-700 uppercase">Quick Add</h2>
                    <input type="date" id="purchaseDate" class="w-full border p-1 rounded text-[10px] outline-none">
                    <select id="purity" class="w-full border p-1 rounded text-[10px] bg-white">
                        <option value="24">24K</option><option value="22">22K</option>
                        <option value="21">21K</option><option value="18">18K</option>
                    </select>
                    <div class="grid grid-cols-2 gap-1">
                        <input type="number" id="grams" placeholder="Grams" class="border p-1 rounded text-[10px]">
                        <input type="number" id="price" placeholder="Price" class="border p-1 rounded text-[10px]">
                    </div>
                    <button onclick="addEntry()" class="w-full bg-yellow-600 text-white py-1 rounded font-bold uppercase text-[10px] hover:bg-yellow-700 transition">Add Entry</button>
                </div>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto bg-white">
            <table class="w-full text-left border-collapse" id="reportTable">
                <thead class="bg-gray-100 text-gray-700 uppercase font-bold text-[9px] sticky top-0 z-10">
                    <tr>
                        <th class="p-3 border-b">Date</th>
                        <th class="p-3 border-b">Type</th>
                        <th class="p-3 border-b text-center">Weight</th>
                        <th class="p-3 border-b text-center">Total Cost</th>
                        <th class="p-3 border-b text-center">Current Val.</th>
                        <th class="p-3 border-b text-center">Profit (%)</th>
                        <th class="p-3 border-b text-center">Profit (QAR)</th>
                        <th class="p-3 border-b text-right no-pdf">Action</th>
                    </tr>
                </thead>
                <tbody id="goldTable" class="text-[11px]"></tbody>
            </table>
        </div>
    </div>

    <script>
        const livePrice24K = 599.50;
        let lineChart, donutChart;

        window.onload = function() {
            document.getElementById('purchaseDate').valueAsDate = new Date();
            initCharts();
            loadEntries();
        };

        function initCharts() {
            const lineCtx = document.getElementById('goldChart').getContext('2d');
            lineChart = new Chart(lineCtx, {
                type: 'line',
                data: {
                    labels: ['W1', 'W2', 'W3', 'Today'],
                    datasets: [{
                        data: [580, 592, 588, 599.50],
                        borderColor: '#ca8a04',
                        backgroundColor: 'rgba(202, 138, 4, 0.1)',
                        fill: true, tension: 0.4, pointRadius: 2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
            });

            const donutCtx = document.getElementById('weightDonut').getContext('2d');
            donutChart = new Chart(donutCtx, {
                type: 'doughnut',
                data: {
                    labels: ['24K', '22K', '21K', '18K'],
                    datasets: [{
                        data: [0, 0, 0, 0],
                        backgroundColor: ['#ca8a04', '#eab308', '#facc15', '#fef08a'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    cutout: '80%'
                }
            });
        }

        function updateLineChart(range) {
            const dataMap = { '1D': [598, 597, 599, 599.5], '1M': [580, 592, 588, 599.5] };
            lineChart.data.datasets[0].data = dataMap[range] || dataMap['1M'];
            lineChart.update();
        }

        function addEntry() {
            const rawDate = document.getElementById('purchaseDate').value;
            const purity = parseInt(document.getElementById('purity').value);
            const grams = parseFloat(document.getElementById('grams').value) || 0;
            const price = parseFloat(document.getElementById('price').value) || 0;
            if(!rawDate || grams <= 0) return alert("Enter Grams!");
            const entry = { id: Date.now(), timestamp: new Date(rawDate).getTime(), dateStr: new Date(rawDate).toLocaleDateString('en-GB'), purity, grams, totalCost: (grams * price) };
            let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
            entries.push(entry);
            localStorage.setItem('goldEntries', JSON.stringify(entries));
            loadEntries();
        }

        function loadEntries() {
            const tableBody = document.getElementById('goldTable');
            tableBody.innerHTML = '';
            let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
            const weights = { 24: 0, 22: 0, 21: 0, 18: 0 };
            let tGrams = 0, tCost = 0, tVal = 0;
            entries.sort((a, b) => b.timestamp - a.timestamp).forEach(e => {
                const currentVal = e.grams * (livePrice24K * (e.purity / 24));
                const profitVal = currentVal - e.totalCost;
                weights[e.purity] += e.grams; tGrams += e.grams; tCost += e.totalCost; tVal += currentVal;
                const color = profitVal >= 0 ? 'text-green-600' : 'text-red-600';
                tableBody.innerHTML += `<tr class="hover:bg-gray-50 border-b"><td class="p-3">${e.dateStr}</td><td class="p-3 font-bold">${e.purity}K</td><td class="p-3 text-center">${e.grams}g</td><td class="p-3 text-center">${e.totalCost.toLocaleString()}</td><td class="p-3 text-center">${currentVal.toLocaleString(undefined, {maximumFractionDigits:0})}</td><td class="p-3 text-center font-bold ${color}">${((profitVal/e.totalCost)*100).toFixed(1)}%</td><td class="p-3 text-center font-bold ${color}">${profitVal.toLocaleString(undefined, {maximumFractionDigits:0})}</td><td class="p-3 text-right no-pdf"><button class="text-red-400 font-bold" onclick="deleteEntry(${e.id})">Del</button></td></tr>`;
            });
            document.getElementById('statCount').innerText = entries.length;
            document.getElementById('statGrams').innerText = tGrams.toFixed(2) + 'g';
            document.getElementById('statInvested').innerText = 'QAR ' + tCost.toLocaleString();
            document.getElementById('statValue').innerText = 'QAR ' + tVal.toLocaleString(undefined, {maximumFractionDigits:0});
            document.getElementById('statProfit').innerText = 'QAR ' + (tVal - tCost).toLocaleString(undefined, {maximumFractionDigits: 0});
            donutChart.data.datasets[0].data = [weights[24], weights[22], weights[21], weights[18]];
            donutChart.update();
        }

        function deleteEntry(id) { if(confirm("Confirm?")) { let entries = JSON.parse(localStorage.getItem('goldEntries')) || []; entries = entries.filter(e => e.id !== id); localStorage.setItem('goldEntries', JSON.stringify(entries)); loadEntries(); } }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text("Gold Investment Report", 14, 15);
            doc.autoTable({ html: '#reportTable', startY: 25 });
            doc.save("Gold_Report.pdf");
        }
    </script>
</body>
</html>
