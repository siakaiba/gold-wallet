<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Investment Wallet V1.9.4</title>
    
    <link rel="icon" type="image/png" href="https://static.vecteezy.com/system/resources/previews/063/053/951/non_2x/gold-wallet-dollar-icon-3d-glossy-golden-wallet-with-dollar-symbol-and-metallic-shine-for-money-finance-spending-and-online-payment-concepts-png.png">
 
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        #mainDashboard, #mainDashboard span, #mainDashboard p, #mainDashboard h1, #mainDashboard h2, #mainDashboard td, #mainDashboard th, #mainDashboard input, #mainDashboard select {
            color: #ffffff !important;
        }
        ::placeholder { color: rgba(255,255,255,0.5) !important; }
        
        .text-green-500 { color: #22c55e !important; }
        .text-red-500 { color: #ef4444 !important; }
        .text-blue-400 { color: #60a5fa !important; }
        .text-red-400 { color: #f87171 !important; }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ca8a04; border-radius: 10px; }
        body { overflow: hidden; background-color: #111827; }
        
        #loadingScreen { position: fixed; inset: 0; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; background-color: #111827; }
        .loader-text-pulse { animation: pulse-gold-text 2s infinite; }
        @keyframes pulse-gold-text { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.6; transform: scale(0.98); } }
        .progress-container { width: 240px; height: 4px; background: #374151; border-radius: 10px; margin-top: 20px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #ca8a04, #facc15); width: 0%; transition: width 4s linear; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
</head>
<body class="h-screen flex flex-col overflow-hidden">
 
    <div id="loadingScreen">
        <h2 class="text-yellow-500 font-bold tracking-widest uppercase text-sm loader-text-pulse">Syncing Gold Wallet</h2>
        <div class="progress-container"><div id="loaderBar" class="progress-bar"></div></div>
        <p class="text-gray-500 text-[10px] mt-4 tracking-tighter uppercase opacity-50">Fetching Gold Rates</p>
    </div>
    
    <div id="mainDashboard" class="max-w-7xl mx-auto w-full h-full flex flex-col gap-0 p-0 mt-[5px]">
        <header class="bg-yellow-600 rounded-t-xl shadow-lg flex flex-col md:flex-row justify-between items-center gap-4 shrink-0 px-6 py-2">
            <div class="flex flex-col">
                <h1 class="text-2xl font-bold uppercase tracking-tight">Gold Investment Wallet</h1>
                <div class="text-[8px] md:text-[10px] flex flex-wrap gap-x-6 gap-y-1 mt-1 opacity-95 uppercase tracking-wider">
                    <p>24K: <span id="display24K" class="font-bold underline decoration-yellow-400/50">--</span></p>
                    <p>22K: <span id="display22K" class="font-bold underline decoration-yellow-400/50">--</span></p>
                    <p>21K: <span id="display21K" class="font-bold underline decoration-yellow-400/50">--</span></p>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <select id="currencySelector" onchange="changeCurrency()" class="bg-yellow-800/40 text-[10px] font-bold border border-yellow-500/20 rounded-lg h-9 px-2 outline-none no-pdf">
                    <option value="QAR">QAR</option>
                    <option value="JOD">JOD</option>
                    <option value="USD">USD</option>
                    <option value="EUR">EUR</option>
                </select>
                <div class="flex flex-col items-end border-l border-yellow-500/30 pl-4 mr-[3px]">
                    <div class="flex items-center gap-3 mb-1">
                        <span id="realTimeClock" class="text-[10px] font-bold opacity-80">00:00:00</span>
                        <span class="text-[10px] font-bold opacity-80">V1.9.4</span>
                    </div>
                </div>
            </div>
        </header>
 
        <div id="statsContainer" class="grid grid-cols-1 md:grid-cols-5 bg-gray-800 border-x border-gray-700 p-6 gap-3 border-b text-center shrink-0">
            <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
                <p class="text-[10px] uppercase font-bold opacity-70">Total Weight</p>
                <p id="statGrams" class="text-xl font-black">0.00g</p>
            </div>
            <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
                <p class="text-[10px] uppercase font-bold opacity-70">Invested</p>
                <p id="statInvested" class="text-xl font-black">--</p>
            </div>
            <div id="cardValue" class="bg-gray-700 p-4 rounded-lg border border-gray-600">
                <p class="text-[10px] uppercase font-bold opacity-70">Market Value</p>
                <p id="statValue" class="text-xl font-black">--</p>
            </div>
            <div id="cardProfit" class="bg-gray-700 p-4 rounded-lg border border-gray-600">
                <p class="text-[10px] uppercase font-bold opacity-70">Net Profit</p>
                <p id="statProfit" class="text-xl font-black">--</p>
            </div>
            <div class="bg-gray-700 p-4 rounded-lg border border-gray-600">
                <p class="text-[10px] uppercase font-bold opacity-70">Transactions</p>
                <p id="statCount" class="text-xl font-black">0</p>
            </div>
        </div>
 
        <div id="chartsContainer" class="grid grid-cols-1 lg:grid-cols-2 bg-gray-800 border-x border-gray-700 p-6 gap-6 border-b shrink-0">
            <div class="flex flex-col">
                <h2 class="text-sm font-bold uppercase tracking-wider mb-2">Wallet Growth (<span class="currency-label">QAR</span>)</h2>
                <div style="height: 160px;"><canvas id="walletBehaviorChart"></canvas></div>
            </div>
            <div class="border-l border-gray-700 lg:px-6">
                <h2 class="text-sm font-bold uppercase tracking-wider mb-2">Market Rates (<span class="currency-label">QAR</span>)</h2>
                <div style="height: 160px;"><canvas id="goldPricesChart"></canvas></div>
            </div>
        </div>
 
        <div class="bg-gray-800 p-4 border-x border-gray-700 shrink-0 no-pdf">
            <div class="grid grid-cols-1 md:grid-cols-6 gap-3">
                <input type="date" id="purchaseDate" class="bg-gray-700 border border-gray-600 p-2 rounded text-sm">
                <select id="purity" class="bg-gray-700 border border-gray-600 p-2 rounded text-sm">
                    <option value="24">24K</option><option value="22">22K</option><option value="21">21K</option>
                </select>
                <input type="number" id="grams" placeholder="Grams" class="bg-gray-700 border border-gray-600 p-2 rounded text-sm">
                <input type="number" id="price" placeholder="Price/g" class="bg-gray-700 border border-gray-600 p-2 rounded text-sm">
                <input type="number" id="costs" placeholder="Making/g" class="bg-gray-700 border border-gray-600 p-2 rounded text-sm">
                <button onclick="addEntry()" class="bg-yellow-600 text-white rounded font-bold hover:bg-yellow-700 uppercase text-xs">Add</button>
            </div>
        </div>
 
        <div class="bg-gray-800 border-x border-b border-gray-700 flex-grow overflow-hidden flex flex-col mb-4 rounded-b-xl">
            <div class="overflow-y-auto custom-scrollbar flex-grow">
                <table class="w-full text-left border-collapse text-sm">
                    <thead class="bg-gray-900 uppercase font-bold text-[10px] sticky top-0 z-10">
                        <tr>
                            <th class="p-4 border-b border-gray-700">Date</th>
                            <th class="p-4 border-b border-gray-700">Type</th>
                            <th class="p-4 border-b border-gray-700 text-center">Weight</th>
                            <th class="p-4 border-b border-gray-700 text-center">Price</th>
                            <th class="p-4 border-b border-gray-700 text-center">Purchase</th>
                            <th class="p-4 border-b border-gray-700 text-center">Current</th>
                            <th class="p-4 border-b border-gray-700 text-center">Profit</th>
                            <th class="p-4 border-b border-gray-700 text-center">%</th>
                            <th class="p-4 border-b border-gray-700 text-center no-pdf">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="goldTable"></tbody>
                </table>
            </div>
        </div>
    </div>
 
    <script>
        Chart.register(ChartDataLabels);
        const DB_URL = "https://samirgoldwallet-default-rtdb.firebaseio.com/entries.json";
        let prevRate = 1;
        let exchangeRates = { QAR: 1, JOD: 0.1947, USD: 0.2747, EUR: 0.2588 };
        let currentCurrency = 'QAR';
        let currentPrices = { k24: 599.50, k22: 555.50, k21: 530.25 };
        let walletChart, goldPricesChart, cachedEntries = null;
 
        window.onload = function() {
            setTimeout(() => { document.getElementById('loaderBar').style.width = '100%'; }, 50);
            setTimeout(() => { document.getElementById('loadingScreen').style.display = 'none'; }, 4000);
            document.getElementById('purchaseDate').valueAsDate = new Date();
            initCharts(); fetchEntries(); fetchLiveRates(); startClock(); startPriceStream();
        };

        function changeCurrency() {
            const newCurrency = document.getElementById('currencySelector').value;
            const conversionFactor = exchangeRates[newCurrency] / exchangeRates[currentCurrency];
            
            // 1. Update Labels
            currentCurrency = newCurrency;
            document.querySelectorAll('.currency-label').forEach(el => el.innerText = currentCurrency);
            
            // 2. Fix the "Drop" - Convert historical chart points
            [goldPricesChart, walletChart].forEach(chart => {
                chart.data.datasets.forEach(dataset => {
                    dataset.data = dataset.data.map(val => val * conversionFactor);
                });
                chart.update();
            });

            updatePriceDisplay(0);
            if(cachedEntries) renderTable(cachedEntries);
        }

        function initCharts() {
            const tc = '#ffffff', gc = '#374151';
            const bo = { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, datalabels: { display: false } }, scales: { x: { ticks: { color: tc, font: { size: 9 } }, grid: { display: false } }, y: { ticks: { color: tc, font: { size: 9 } }, grid: { color: gc } } } };
            
            walletChart = new Chart(document.getElementById('walletBehaviorChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ data: [], borderColor: '#ca8a04', backgroundColor: 'rgba(202, 138, 4, 0.1)', fill: true, tension: 0.3 }] }, options: bo });
            goldPricesChart = new Chart(document.getElementById('goldPricesChart').getContext('2d'), { type: 'line', data: { labels: [], datasets: [{ label: '24K', data: [], borderColor: '#ca8a04', tension: 0.2 }] }, options: bo });
            generateDummyHistory();
        }

        function generateDummyHistory() {
            const labels = []; const data = []; const rate = exchangeRates[currentCurrency];
            for(let i=29; i>=0; i--) {
                labels.push(i + " days ago");
                data.push((currentPrices.k24 - (i*0.2)) * rate);
            }
            goldPricesChart.data.labels = labels; goldPricesChart.data.datasets[0].data = data; goldPricesChart.update();
        }

        async function fetchLiveRates() {
            try {
                const r = await fetch('https://open.er-api.com/v6/latest/QAR');
                const d = await r.json();
                if(d.rates) { exchangeRates.JOD = d.rates.JOD; exchangeRates.USD = d.rates.USD; exchangeRates.EUR = d.rates.EUR; }
            } catch(e) {}
        }

        function startPriceStream() {
            setInterval(() => {
                const jitter = (Math.random() * 0.4 - 0.2);
                currentPrices.k24 += jitter;
                updatePriceDisplay(jitter);
                const rate = exchangeRates[currentCurrency];
                const ds = goldPricesChart.data.datasets[0].data;
                ds[ds.length-1] = currentPrices.k24 * rate;
                goldPricesChart.update('none');
                if(cachedEntries) renderTable(cachedEntries);
            }, 5000);
        }

        function updatePriceDisplay(c) {
            const rate = exchangeRates[currentCurrency];
            document.getElementById('display24K').innerText = (currentPrices.k24 * rate).toFixed(2) + " " + currentCurrency;
            document.getElementById('display22K').innerText = (currentPrices.k24 * (22/24) * rate).toFixed(2) + " " + currentCurrency;
            document.getElementById('display21K').innerText = (currentPrices.k24 * (21/24) * rate).toFixed(2) + " " + currentCurrency;
        }

        function formatCurrency(val) {
            return (val * exchangeRates[currentCurrency]).toLocaleString(undefined, { minimumFractionDigits: 2 }) + ' ' + currentCurrency;
        }

        async function fetchEntries() { const r = await fetch(DB_URL); cachedEntries = await r.json(); renderTable(cachedEntries); }

        function renderTable(data) {
            const tb = document.getElementById('goldTable'); tb.innerHTML = '';
            if(!data) return;
            const en = Object.keys(data).map(k => ({id:k, ...data[k]})).sort((a,b) => a.timestamp - b.timestamp);
            let tg=0, ti=0, tv=0;
            const rate = exchangeRates[currentCurrency];
            
            en.reverse().forEach(e => {
                const curVal = e.grams * (currentPrices.k24 * (e.purity/24));
                const profit = curVal - e.totalCost;
                const perc = ((profit/e.totalCost)*100).toFixed(2);
                tg += e.grams; ti += e.totalCost; tv += curVal;
                
                tb.innerHTML += `<tr class="border-b border-gray-700">
                    <td class="p-4 text-xs">${e.dateStr}</td>
                    <td class="p-4 font-bold">${e.purity}K</td>
                    <td class="p-4 text-center">${e.grams}g</td>
                    <td class="p-4 text-center text-xs">${formatCurrency(e.totalCost/e.grams)}</td>
                    <td class="p-4 text-center font-bold text-yellow-500">${formatCurrency(e.totalCost)}</td>
                    <td class="p-4 text-center font-bold text-blue-400">${formatCurrency(curVal)}</td>
                    <td class="p-4 text-center font-bold ${profit>=0?'text-green-500':'text-red-500'}">${formatCurrency(profit)}</td>
                    <td class="p-4 text-center font-bold ${profit>=0?'text-green-500':'text-red-500'}">${perc}%</td>
                    <td class="p-4 text-center no-pdf"><button onclick="deleteEntry('${e.id}')" class="text-red-400 text-xs">Delete</button></td>
                </tr>`;
            });
            updateStats(en.length, tg, ti, tv);
        }

        function updateStats(c, g, i, v) {
            document.getElementById('statGrams').innerText = g.toFixed(2) + "g";
            document.getElementById('statInvested').innerText = formatCurrency(i);
            document.getElementById('statValue').innerText = formatCurrency(v);
            document.getElementById('statProfit').innerText = formatCurrency(v-i);
            document.getElementById('statCount').innerText = c;
        }

        async function deleteEntry(id) { if(confirm("Delete?")) { await fetch(`https://samirgoldwallet-default-rtdb.firebaseio.com/entries/${id}.json`, {method:'DELETE'}); fetchEntries(); } }
        function startClock() { setInterval(() => { const n = new Date(); document.getElementById('realTimeClock').innerText = n.toLocaleTimeString('en-GB'); }, 1000); }
    </script>
</body>
</html>
