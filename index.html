<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samir's Gold Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-2 md:p-4 font-sans text-gray-900">
    <div class="max-w-7xl mx-auto">
        <header class="bg-yellow-600 text-white p-4 rounded-t-xl shadow-lg flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-xl font-bold uppercase tracking-tight">Gold Investment Wallet</h1>
                <p class="text-yellow-100 text-xs">Live 24K Price (Qatar): <span class="font-bold">599.50 QAR/g</span></p>
            </div>
            <button onclick="downloadPDF()" class="bg-white text-yellow-700 px-4 py-1.5 rounded-lg text-sm font-bold shadow hover:bg-yellow-50 transition mt-2 md:mt-0">Download PDF</button>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-5 bg-white border-x p-3 gap-2 border-b text-center">
            <div class="bg-gray-50 p-2 rounded-lg border border-gray-200">
                <p class="text-[9px] text-gray-500 uppercase font-bold">Purchases</p>
                <p id="statCount" class="text-lg font-black text-gray-800">0</p>
            </div>
            <div class="bg-gray-50 p-2 rounded-lg border border-gray-200">
                <p class="text-[9px] text-gray-500 uppercase font-bold">Total Weight</p>
                <p id="statGrams" class="text-lg font-black text-gray-800">0.00g</p>
            </div>
            <div class="bg-gray-50 p-2 rounded-lg border border-gray-200">
                <p class="text-[9px] text-gray-500 uppercase font-bold">Investment</p>
                <p id="statInvested" class="text-lg font-black text-gray-700">QAR 0</p>
            </div>
            <div id="cardValue" class="p-2 rounded-lg border shadow-sm transition-colors duration-300 bg-gray-50 border-gray-200">
                <p class="text-[9px] uppercase font-bold text-gray-500">Value</p>
                <p id="statValue" class="text-lg font-black text-gray-800">QAR 0</p>
            </div>
            <div id="cardProfit" class="p-2 rounded-lg border shadow-sm transition-colors duration-300 bg-gray-50 border-gray-200">
                <p class="text-[9px] uppercase font-bold text-gray-500">Profit/Loss</p>
                <p id="statProfit" class="text-lg font-black text-gray-800">QAR 0</p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 bg-white border-x p-4 gap-4 border-b">
            <div class="lg:col-span-2">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-xs font-bold text-gray-700 uppercase tracking-wider">Historical Price (QAR/g)</h2>
                    <div class="flex gap-1 bg-gray-100 p-1 rounded-lg">
                        <button onclick="updateMainChart('1D')" class="px-2 py-0.5 text-[9px] font-bold rounded hover:bg-white transition">1D</button>
                        <button onclick="updateMainChart('MAX')" class="px-2 py-0.5 text-[9px] font-bold rounded bg-white shadow-sm transition">MAX</button>
                    </div>
                </div>
                <div style="height: 180px;"><canvas id="historyChart"></canvas></div>
            </div>
            <div class="border-l lg:pl-4 text-center">
                <h2 class="text-xs font-bold text-gray-700 uppercase tracking-wider mb-2">Allocation</h2>
                <div style="height: 180px;"><canvas id="weightDonut"></canvas></div>
            </div>
        </div>

        <div class="bg-white p-4 shadow-md border-x">
            <div class="grid grid-cols-2 md:grid-cols-6 gap-2">
                <input type="date" id="purchaseDate" class="border p-1.5 rounded text-xs outline-none">
                <select id="purity" class="border p-1.5 rounded text-xs bg-white outline-none">
                    <option value="24">24K</option><option value="22">22K</option>
                    <option value="21">21K</option><option value="18">18K</option>
                </select>
                <input type="number" id="grams" placeholder="Grams" class="border p-1.5 rounded text-xs outline-none">
                <input type="number" id="price" placeholder="Price/g" class="border p-1.5 rounded text-xs outline-none">
                <input type="number" id="costs" placeholder="Making" class="border p-1.5 rounded text-xs outline-none">
                <button onclick="addEntry()" class="bg-yellow-600 text-white h-8 rounded font-bold hover:bg-yellow-700 transition uppercase text-[10px]">Add Entry</button>
            </div>
        </div>

        <div class="bg-white shadow-md rounded-b-xl overflow-x-auto text-xs border-x border-b">
            <table class="w-full text-left border-collapse" id="reportTable">
                <thead class="bg-gray-100 text-gray-700 uppercase font-bold text-[9px]">
                    <tr>
                        <th class="p-3 border-b">Date</th><th class="p-3 border-b">Type</th>
                        <th class="p-3 border-b text-center">Weight</th><th class="p-3 border-b text-center">Total Cost</th>
                        <th class="p-3 border-b text-center">Value</th><th class="p-3 border-b text-center">Profit %</th>
                        <th class="p-3 border-b text-center">Gain</th><th class="p-3 border-b text-right no-pdf">Action</th>
                    </tr>
                </thead>
                <tbody id="goldTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const livePrice24K = 599.50;
        let historyChart, donutChart;
        const years = ['2000', '2010', '2020', '2026'];
        const histData = {
            '24K': [32, 140, 220, 599.50],
            '22K': [29, 128, 201, 555.50],
            '21K': [28, 122, 192, 524.30],
            '18K': [24, 105, 165, 449.60]
        };

        window.onload = function() {
            document.getElementById('purchaseDate').valueAsDate = new Date();
            initCharts();
            loadEntries();
        };

        function initCharts() {
            const histCtx = document.getElementById('historyChart').getContext('2d');
            historyChart = new Chart(histCtx, {
                type: 'line',
                data: {
                    labels: years,
                    datasets: Object.keys(histData).map(k => ({
                        label: k, data: histData[k], borderColor: '#ca8a04', borderWidth: 2, pointRadius: 0, tension: 0.3
                    }))
                },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'top', labels: { boxWidth: 10, font: { size: 9 } } } } }
            });

            const donutCtx = document.getElementById('weightDonut').getContext('2d');
            donutChart = new Chart(donutCtx, {
                type: 'doughnut',
                data: { labels: ['24K', '22K', '21K', '18K'], datasets: [{ data: [0, 0, 0, 0], backgroundColor: ['#ca8a04', '#eab308', '#facc15', '#fef08a'], borderWidth: 0 }] },
                options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, cutout: '75%' }
            });
        }

        function updateMainChart(range) {
            if (range === 'MAX') {
                historyChart.data.labels = years;
                historyChart.data.datasets.forEach(ds => { ds.data = histData[ds.label]; });
            } else {
                historyChart.data.labels = ['M', 'T', 'W', 'T', 'F'];
                historyChart.data.datasets.forEach(ds => {
                    const last = histData[ds.label][histData[ds.label].length-1];
                    ds.data = [last-5, last-2, last+1, last-1, last];
                });
            }
            historyChart.update();
        }

        function addEntry() {
            const rawDate = document.getElementById('purchaseDate').value;
            const purity = parseInt(document.getElementById('purity').value);
            const grams = parseFloat(document.getElementById('grams').value) || 0;
            const price = parseFloat(document.getElementById('price').value) || 0;
            const costs = parseFloat(document.getElementById('costs').value) || 0;
            if(!rawDate || grams <= 0) return alert("Fill Grams!");
            const entry = { id: Date.now(), timestamp: new Date(rawDate).getTime(), dateStr: new Date(rawDate).toLocaleDateString('en-GB'), purity, grams, totalCost: (grams * price) + costs };
            let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
            entries.push(entry);
            localStorage.setItem('goldEntries', JSON.stringify(entries));
            loadEntries();
            document.getElementById('grams').value = '';
        }

        function loadEntries() {
            const tableBody = document.getElementById('goldTable');
            tableBody.innerHTML = '';
            let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
            const weights = { 24: 0, 22: 0, 21: 0, 18: 0 };
            let tGrams = 0, tCost = 0, tVal = 0;
            entries.sort((a, b) => b.timestamp - a.timestamp).forEach(e => {
                const currentVal = e.grams * (livePrice24K * (e.purity / 24));
                const profitVal = currentVal - e.totalCost;
                weights[e.purity] += e.grams; tGrams += e.grams; tCost += e.totalCost; tVal += currentVal;
                const color = profitVal >= 0 ? 'text-green-600' : 'text-red-600';
                tableBody.innerHTML += `<tr class="border-b"><td class="p-3">${e.dateStr}</td><td class="p-3 font-bold">${e.purity}K</td><td class="p-3 text-center">${e.grams}g</td><td class="p-3 text-center">${e.totalCost.toLocaleString()}</td><td class="p-3 text-center">${currentVal.toLocaleString(undefined,{maximumFractionDigits:0})}</td><td class="p-3 text-center font-bold ${color}">${((profitVal/e.totalCost)*100).toFixed(1)}%</td><td class="p-3 text-center font-bold ${color}">${profitVal.toLocaleString(undefined,{maximumFractionDigits:0})}</td><td class="p-3 text-right no-pdf"><button class="text-red-400 font-bold" onclick="deleteEntry(${e.id})">Del</button></td></tr>`;
            });
            document.getElementById('statCount').innerText = entries.length;
            document.getElementById('statGrams').innerText = tGrams.toFixed(2) + 'g';
            document.getElementById('statInvested').innerText = 'QAR ' + tCost.toLocaleString();
            document.getElementById('statValue').innerText = 'QAR ' + tVal.toLocaleString(undefined, {maximumFractionDigits:0});
            document.getElementById('statProfit').innerText = 'QAR ' + (tVal - tCost).toLocaleString(undefined, {maximumFractionDigits: 0});
            updateCardColors(tVal, tCost);
            donutChart.data.datasets[0].data = [weights[24], weights[22], weights[21], weights[18]];
            donutChart.update();
        }

        function updateCardColors(tVal, tCost) {
            const cardProfit = document.getElementById('cardProfit');
            if (tVal > tCost) cardProfit.className = "p-2 rounded-lg border border-green-200 bg-green-50 shadow-sm";
            else if (tVal < tCost) cardProfit.className = "p-2 rounded-lg border border-red-200 bg-red-50 shadow-sm";
        }

        function deleteEntry(id) {
            if(confirm("Are you sure?")) {
                let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
                entries = entries.filter(e => e.id !== id);
                localStorage.setItem('goldEntries', JSON.stringify(entries));
                loadEntries();
            }
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text("Gold Investment Report", 14, 15);
            doc.autoTable({ html: '#reportTable', startY: 25 });
            doc.save("Gold_Report.pdf");
        }
    </script>
</body>
</html>
