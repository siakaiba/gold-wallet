<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gold Investment Wallet</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ca8a04; border-radius: 10px; }
        body { overflow: hidden; }
        #loginOverlay { backdrop-filter: blur(12px); z-index: 100; transition: opacity 0.5s ease; }
        .google-btn { background: white; color: #444; border-radius: 5px; border: 1px solid #ddd; font-weight: bold; padding: 10px 15px; display: flex; align-items: center; gap: 10px; transition: all 0.3s; }
        .google-btn:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); background: #fcfcfc; }
    </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 font-sans text-gray-900 dark:text-gray-100 transition-colors duration-300 h-screen flex flex-col overflow-hidden">

    <div id="loginOverlay" class="fixed inset-0 bg-black/60 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-yellow-500/20 text-center">
            <div class="bg-yellow-100 p-4 rounded-full inline-block mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-yellow-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
                </svg>
            </div>
            <h2 class="text-2xl font-bold mb-2">Gold Wallet</h2>
            <p class="text-gray-500 mb-8">Sign in with Google to manage your investments</p>
            
            <button onclick="loginWithGoogle()" class="google-btn w-full justify-center">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="Google Logo">
                Sign in with Google
            </button>
            
            <p class="mt-8 text-[10px] text-gray-400 uppercase tracking-widest">Session Timeout: 1 Hour</p>
        </div>
    </div>
    
    <div id="mainDashboard" class="max-w-7xl mx-auto w-full h-full flex flex-col gap-0 p-0 mt-[5px] bg-gray-100 dark:bg-gray-900 hidden">
        
        <header class="bg-yellow-600 text-white rounded-t-xl shadow-lg flex flex-col md:flex-row justify-between items-center gap-4 shrink-0 px-6 py-2">
            <div class="flex flex-col">
                <div class="flex items-center gap-3">
                    <img id="userAvatar" class="h-6 w-6 rounded-full border border-yellow-300 hidden" alt="Avatar">
                    <h1 class="text-xl font-bold uppercase tracking-tight">Gold Wallet</h1>
                </div>
                <div class="text-[10px] md:text-[12px] flex flex-wrap gap-x-6 gap-y-1 mt-1">
                    <p class="text-yellow-100">24K: <span id="display24K" class="font-bold text-white underline">--</span></p>
                    <p class="text-yellow-100">22K: <span id="display22K" class="font-bold text-white underline">--</span></p>
                    <p class="text-yellow-100">21K: <span id="display21K" class="font-bold text-white underline">--</span></p>
                </div>
            </div>
            
            <div class="flex items-center gap-6">
                <button onclick="logout()" class="text-[10px] font-bold opacity-60 hover:opacity-100 uppercase">Logout</button>
                <div class="relative bg-yellow-800/40 p-1 rounded-lg flex w-24 h-8 items-center cursor-pointer border border-yellow-500/20" onclick="toggleTheme()">
                    <div class="theme-active absolute top-1 left-1 bottom-1 w-[calc(50%-4px)] bg-white dark:bg-gray-800 rounded shadow-sm"></div>
                    <div class="relative flex-1 text-center text-[8px] font-bold z-10 dark:text-white dark:opacity-40">LGT</div>
                    <div class="relative flex-1 text-center text-[8px] font-bold z-10 text-white opacity-40 dark:opacity-100">DRK</div>
                </div>
                <div class="flex flex-col items-end border-l border-yellow-500/30 pl-6">
                    <div class="flex items-center gap-3">
                        <span id="realTimeClock" class="text-[10px] font-bold opacity-80">--</span>
                        <span class="text-[10px] font-bold opacity-80">V2.0</span>
                    </div>
                </div>
            </div>
        </header>
 
        <div id="statsContainer" class="grid grid-cols-1 md:grid-cols-5 bg-white dark:bg-gray-800 border-x dark:border-gray-700 p-6 gap-3 border-b text-center shrink-0">
            <div class="bg-gray-50 dark:bg-gray-700 p-4 rounded-lg border border-gray-200 dark:border-gray-600"><p class="text-[10px] text-gray-500 uppercase font-bold">Entries</p><p id="statCount" class="text-xl font-black">0</p></div>
            <div class="bg-gray-50 dark:bg-gray-700 p-4 rounded-lg border border-gray-200 dark:border-gray-600"><p class="text-[10px] text-gray-500 uppercase font-bold">Weight</p><p id="statGrams" class="text-xl font-black">0.00g</p></div>
            <div class="bg-gray-50 dark:bg-gray-700 p-4 rounded-lg border border-gray-200 dark:border-gray-600"><p class="text-[10px] text-gray-500 uppercase font-bold">Invested</p><p id="statInvested" class="text-xl font-black">0</p></div>
            <div id="cardProfit" class="bg-gray-50 dark:bg-gray-700 p-4 rounded-lg border"><p class="text-[10px] uppercase font-bold">Profit/Loss</p><p id="statProfit" class="text-xl font-black">0</p></div>
            <div id="cardValue" class="bg-gray-50 dark:bg-gray-700 p-4 rounded-lg border"><p class="text-[10px] uppercase font-bold">Value</p><p id="statValue" class="text-xl font-black">0</p></div>
        </div>
 
        <div class="bg-white dark:bg-gray-800 p-4 border-x dark:border-gray-700 no-pdf">
            <div class="grid grid-cols-1 md:grid-cols-6 gap-2">
                <input type="date" id="purchaseDate" class="border dark:border-gray-600 p-2 rounded text-sm dark:bg-gray-700">
                <select id="purity" class="border dark:border-gray-600 p-2 rounded text-sm dark:bg-gray-700"><option value="24">24K</option><option value="22">22K</option><option value="21">21K</option></select>
                <input type="number" id="grams" placeholder="Grams" class="border dark:border-gray-600 p-2 rounded text-sm dark:bg-gray-700">
                <input type="number" id="price" placeholder="Price/g" class="border dark:border-gray-600 p-2 rounded text-sm dark:bg-gray-700">
                <input type="number" id="costs" placeholder="Making/g" class="border dark:border-gray-600 p-2 rounded text-sm dark:bg-gray-700">
                <button onclick="addEntry()" class="bg-yellow-600 text-white rounded font-bold uppercase text-xs p-2">Add</button>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 border-x border-b dark:border-gray-700 flex-grow overflow-hidden flex flex-col mb-4">
            <div class="overflow-y-auto custom-scrollbar flex-grow">
                <table class="w-full text-left text-sm">
                    <thead class="bg-gray-100 dark:bg-gray-700 sticky top-0 uppercase text-[9px] font-bold">
                        <tr><th class="p-4">Date</th><th class="p-4">Purity</th><th class="p-4 text-center">Weight</th><th class="p-4 text-center">Price Paid</th><th class="p-4 text-center">Profit %</th><th class="p-4 text-right no-pdf">Actions</th></tr>
                    </thead>
                    <tbody id="goldTable"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "samirgoldwallet.firebaseapp.com",
            databaseURL: "https://samirgoldwallet-default-rtdb.firebaseio.com",
            projectId: "samirgoldwallet",
            storageBucket: "samirgoldwallet.appspot.com",
            messagingSenderId: "YOUR_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const DB_URL = "https://samirgoldwallet-default-rtdb.firebaseio.com/entries.json";

        let currentPrices = { k24: 600, k22: 550, k21: 525 };
        let cachedEntries = null;
        let isEditingLocked = false;

        // --- 2. AUTHENTICATION LOGIC ---
        auth.onAuthStateChanged(user => {
            const session = JSON.parse(localStorage.getItem('gold_wallet_session'));
            const now = new Date().getTime();

            if (user && session && (now - session.timestamp < 3600000)) {
                showApp(user);
            } else {
                logout();
            }
        });

        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).then(result => {
                const session = { timestamp: new Date().getTime() };
                localStorage.setItem('gold_wallet_session', JSON.stringify(session));
                // showApp is triggered by onAuthStateChanged
            }).catch(error => alert(error.message));
        }

        function showApp(user) {
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('mainDashboard').classList.remove('hidden');
            if (user.photoURL) {
                const avatar = document.getElementById('userAvatar');
                avatar.src = user.photoURL;
                avatar.classList.remove('hidden');
            }
            fetchEntries();
            startClock();
            startPriceStream();
        }

        function logout() {
            auth.signOut();
            localStorage.removeItem('gold_wallet_session');
            document.getElementById('loginOverlay').classList.remove('hidden');
            document.getElementById('mainDashboard').classList.add('hidden');
        }

        // --- 3. APP LOGIC (Table, Stats, Live Prices) ---
        function startPriceStream() {
            setInterval(() => {
                const flux = (Math.random() * 2 - 1);
                currentPrices.k24 = parseFloat((currentPrices.k24 + flux).toFixed(2));
                currentPrices.k22 = Math.round(currentPrices.k24 * (22/24));
                currentPrices.k21 = Math.round(currentPrices.k24 * (21/24));
                
                document.getElementById('display24K').innerText = currentPrices.k24;
                document.getElementById('display22K').innerText = currentPrices.k22;
                document.getElementById('display21K').innerText = currentPrices.k21;

                if(cachedEntries && !isEditingLocked) renderTable(cachedEntries);
            }, 5000);
        }

        function renderTable(data) {
            const tableBody = document.getElementById('goldTable');
            tableBody.innerHTML = '';
            const entries = Object.keys(data).map(key => ({ id: key, ...data[key] }));
            entries.sort((a, b) => b.timestamp - a.timestamp); // Recent first
            
            let tGrams = 0, tInvested = 0, tValue = 0;

            entries.forEach(e => {
                const liveRate = currentPrices.k24 * (e.purity / 24);
                const liveVal = e.grams * liveRate;
                const profitQar = liveVal - e.totalCost;
                const profitPercent = ((profitQar / e.totalCost) * 100).toFixed(2);
                
                tGrams += e.grams; tInvested += e.totalCost; tValue += liveVal;

                tableBody.innerHTML += `
                    <tr id="row-${e.id}" class="border-b dark:border-gray-700">
                        <td class="p-4">${e.dateStr}</td>
                        <td class="p-4 font-bold text-yellow-600">${e.purity}K</td>
                        <td class="p-4 text-center">${e.grams}g</td>
                        <td class="p-4 text-center">QAR ${Math.round(e.totalCost)}</td>
                        <td class="p-4 text-center font-bold ${profitQar>=0?'text-green-500':'text-red-500'}">${profitPercent}%</td>
                        <td class="p-4 text-right">
                            <button class="text-blue-400 text-xs mr-2" onclick="toggleEdit('${e.id}', true)">Edit</button>
                            <button class="text-red-400 text-xs" onclick="deleteEntry('${e.id}')">Delete</button>
                        </td>
                    </tr>`;
            });
            updateStats(entries.length, tGrams, tInvested, tValue);
        }

        // Stats update
        function updateStats(c, g, i, v) {
            document.getElementById('statCount').innerText = c;
            document.getElementById('statGrams').innerText = g.toFixed(2) + 'g';
            document.getElementById('statInvested').innerText = Math.round(i).toLocaleString();
            document.getElementById('statValue').innerText = Math.round(v).toLocaleString();
            document.getElementById('statProfit').innerText = Math.round(v-i).toLocaleString();
        }

        async function fetchEntries() {
            const res = await fetch(DB_URL);
            const data = await res.json();
            cachedEntries = data;
            renderTable(data);
        }

        function startClock() {
            const el = document.getElementById('realTimeClock');
            setInterval(() => { el.innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);
        }

        function toggleTheme() { document.documentElement.classList.toggle('dark'); }
    </script>
</body>
</html>
