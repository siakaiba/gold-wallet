<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samir's Gold Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-4 font-sans text-gray-900">
    <div class="max-w-6xl mx-auto">
        <header class="bg-yellow-600 text-white p-6 rounded-t-xl shadow-lg flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold uppercase tracking-tight">Gold Investment Wallet</h1>
                <p class="text-yellow-100">Live 24K Price (Qatar): <span class="font-bold">599.50 QAR/g</span></p>
            </div>
            <div class="mt-4 md:mt-0 flex gap-3">
                <button onclick="downloadPDF()" class="bg-white text-yellow-700 px-4 py-2 rounded-lg font-bold shadow hover:bg-yellow-50 transition">Download PDF Report</button>
            </div>
        </header>

        <div class="bg-white border-x p-6 border-b">
            <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                <h2 class="text-lg font-bold text-gray-700">Market Trend Analysis</h2>
                <div class="flex gap-2 bg-gray-100 p-1 rounded-lg">
                    <button onclick="updateChartRange('1D')" class="chart-btn px-4 py-1 text-xs font-bold rounded hover:bg-white transition">1D</button>
                    <button onclick="updateChartRange('1W')" class="chart-btn px-4 py-1 text-xs font-bold rounded hover:bg-white transition">1W</button>
                    <button onclick="updateChartRange('1M')" class="chart-btn px-4 py-1 text-xs font-bold rounded bg-white shadow-sm transition">1M</button>
                    <button onclick="updateChartRange('1Y')" class="chart-btn px-4 py-1 text-xs font-bold rounded hover:bg-white transition">1Y</button>
                </div>
            </div>
            <div style="height: 250px; position: relative;">
                <canvas id="goldChart"></canvas>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 bg-white border-x p-6 gap-4 border-b">
            <div class="bg-gray-50 p-4 rounded-lg border">
                <p class="text-xs text-gray-500 uppercase font-bold">Total Weight</p>
                <p id="statGrams" class="text-2xl font-black">0.00g</p>
            </div>
            <div class="bg-gray-50 p-4 rounded-lg border">
                <p class="text-xs text-gray-500 uppercase font-bold">Total Investment (Cost)</p>
                <p id="statInvested" class="text-2xl font-black text-gray-700">QAR 0.00</p>
            </div>
            <div class="bg-gray-50 p-4 rounded-lg border">
                <p class="text-xs text-gray-500 uppercase font-bold">Net Profit/Loss</p>
                <p id="statProfit" class="text-2xl font-black">QAR 0.00</p>
            </div>
        </div>

        <div class="bg-white p-6 shadow-md border-x">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                <input type="date" id="purchaseDate" class="border p-2 rounded text-sm outline-none">
                <input type="number" id="grams" placeholder="Grams" class="border p-2 rounded text-sm">
                <input type="number" id="price" placeholder="Price/g (QAR)" class="border p-2 rounded text-sm">
                <input type="number" id="costs" placeholder="Making Costs" class="border p-2 rounded text-sm">
                <button onclick="addEntry()" class="bg-yellow-600 text-white h-10 rounded font-bold hover:bg-yellow-700 transition uppercase text-xs">Add Entry</button>
            </div>
        </div>

        <div class="bg-white shadow-md rounded-b-xl overflow-x-auto text-sm border-x border-b">
            <table class="w-full text-left border-collapse" id="reportTable">
                <thead class="bg-gray-100 text-gray-700 uppercase font-bold text-[10px]">
                    <tr>
                        <th class="p-4 border-b">Date</th>
                        <th class="p-4 border-b">Day</th>
                        <th class="p-4 border-b text-center">Weight</th>
                        <th class="p-4 border-b text-center">Total Cost</th>
                        <th class="p-4 border-b text-center">Current Val.</th>
                        <th class="p-4 border-b text-center">Prob.</th>
                        <th class="p-4 border-b text-center">% Pos. Prob.</th>
                        <th class="p-4 border-b text-center">Profit (QAR)</th>
                        <th class="p-4 border-b text-right no-pdf">Action</th>
                    </tr>
                </thead>
                <tbody id="goldTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const livePrice = 599.50;
        let myChart;

        window.onload = function() {
            document.getElementById('purchaseDate').valueAsDate = new Date();
            loadEntries();
            initChart();
        };

        function initChart() {
            const ctx = document.getElementById('goldChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['W1', 'W2', 'W3', 'Current'],
                    datasets: [{
                        data: [580, 592, 588, 599.50],
                        borderColor: '#ca8a04',
                        backgroundColor: 'rgba(202, 138, 4, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } }
                }
            });
        }

        function updateChartRange(range) {
            const dataMap = {
                '1D': [598, 597, 599, 599.5],
                '1W': [590, 595, 592, 599.5],
                '1M': [580, 592, 588, 599.5],
                '1Y': [510, 540, 570, 599.5]
            };
            myChart.data.datasets[0].data = dataMap[range];
            myChart.update();
            
            document.querySelectorAll('.chart-btn').forEach(btn => btn.classList.remove('bg-white', 'shadow-sm'));
            event.target.classList.add('bg-white', 'shadow-sm');
        }
