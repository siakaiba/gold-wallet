<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samir's Gold Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 p-4 font-sans text-gray-900">
    <div class="max-w-6xl mx-auto">
        <header class="bg-yellow-600 text-white p-6 rounded-t-xl shadow-lg flex flex-col md:flex-row justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold uppercase tracking-tight">Gold Investment Wallet</h1>
                <p class="text-yellow-100">Live 24K Price (Qatar): <span class="font-bold">599.50 QAR/g</span></p>
            </div>
            <div class="mt-4 md:mt-0 flex gap-3">
                <button onclick="downloadPDF()" class="bg-white text-yellow-700 px-4 py-2 rounded-lg font-bold shadow hover:bg-yellow-50 transition">Download PDF Report</button>
            </div>
        </header>

        <div class="bg-white border-x p-6 border-b">
            <div class="flex flex-col md:flex-row justify-between items-center mb-4 gap-4">
                <h2 class="text-lg font-bold text-gray-700">Market Trend Analysis</h2>
                <div class="flex gap-2 bg-gray-100 p-1 rounded-lg">
                    <button onclick="updateChartRange('1D')" class="px-4 py-1 text-xs font-bold rounded hover:bg-white transition">1D</button>
                    <button onclick="updateChartRange('1W')" class="px-4 py-1 text-xs font-bold rounded hover:bg-white transition">1W</button>
                    <button onclick="updateChartRange('1M')" id="btn-1M" class="px-4 py-1 text-xs font-bold rounded bg-white shadow-sm transition">1M</button>
                    <button onclick="updateChartRange('1Y')" class="px-4 py-1 text-xs font-bold rounded hover:bg-white transition">1Y</button>
                </div>
            </div>
            <div class="h-64">
                <canvas id="goldChart"></canvas>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 bg-white border-x p-6 gap-4 border-b">
            <div class="bg-gray-50 p-4 rounded-lg border">
                <p class="text-xs text-gray-500 uppercase font-bold">Total Weight</p>
                <p id="statGrams" class="text-2xl font-black">0.00g</p>
            </div>
            <div class="bg-gray-50 p-4 rounded-lg border border-gray-200">
                <p class="text-xs text-gray-500 uppercase font-bold">Total Investment (Cost)</p>
                <p id="statInvested" class="text-2xl font-black text-gray-700">QAR 0.00</p>
            </div>
            <div class="bg-gray-50 p-4 rounded-lg border">
                <p class="text-xs text-gray-500 uppercase font-bold">Net Profit/Loss</p>
                <p id="statProfit" class="text-2xl font-black">QAR 0.00</p>
            </div>
        </div>

        <div class="bg-white p-6 shadow-md border-x">
            <div class="grid grid-cols-1 md:grid-cols-5 gap-3">
                <div class="flex flex-col">
                    <label class="text-[10px] uppercase font-bold text-gray-400 mb-1">Purchase Date</label>
                    <input type="date" id="purchaseDate" class="border p-2 rounded text-sm outline-none focus:ring-2 focus:ring-yellow-500">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] uppercase font-bold text-gray-400 mb-1">Weight (Grams)</label>
                    <input type="number" id="grams" placeholder="e.g. 10" class="border p-2 rounded text-sm outline-none">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] uppercase font-bold text-gray-400 mb-1">Market Price/g</label>
                    <input type="number" id="price" placeholder="QAR" class="border p-2 rounded text-sm outline-none">
                </div>
                <div class="flex flex-col">
                    <label class="text-[10px] uppercase font-bold text-gray-400 mb-1">Making Charges</label>
                    <input type="number" id="costs" placeholder="QAR" class="border p-2 rounded text-sm outline-none">
                </div>
                <div class="flex flex-col justify-end">
                    <button onclick="addEntry()" class="bg-yellow-600 text-white h-10 rounded font-bold hover:bg-yellow-700 transition uppercase text-xs">Add Monthly Grams</button>
                </div>
            </div>
        </div>

        <div class="bg-white shadow-md rounded-b-xl overflow-x-auto text-sm border-x border-b">
            <table class="w-full text-left border-collapse" id="reportTable">
                <thead class="bg-gray-100 text-gray-700 uppercase font-bold text-[11px]">
                    <tr>
                        <th class="p-4 border-b">Date</th>
                        <th class="p-4 border-b">Day</th>
                        <th class="p-4 border-b text-center">Weight</th>
                        <th class="p-4 border-b text-center">Total Cost</th>
                        <th class="p-4 border-b text-center">Current Val.</th>
                        <th class="p-4 border-b text-center">Prob.</th>
                        <th class="p-4 border-b text-center">% Pos. Prob.</th>
                        <th class="p-4 border-b text-center">Profit (QAR)</th>
                        <th class="p-4 border-b text-right no-pdf">Action</th>
                    </tr>
                </thead>
                <tbody id="goldTable"></tbody>
            </table>
        </div>
    </div>

    <script>
        const livePrice = 599.50;
        let myChart;

        window.onload = function() {
            document.getElementById('purchaseDate').valueAsDate = new Date();
            loadEntries();
            initChart();
        };

        // --- Chart Logic ---
        function initChart() {
            const ctx = document.getElementById('goldChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Week 1', 'Week 2', 'Week 3', 'Current'],
                    datasets: [{
                        label: 'Gold Price (QAR)',
                        data: [580, 592, 588, 599.50],
                        borderColor: '#ca8a04',
                        backgroundColor: 'rgba(202, 138, 4, 0.1)',
                        fill: true,
                        tension: 0.4,
                        pointRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: false, grid: { color: '#f3f4f6' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function updateChartRange(range) {
            const dataMap = {
                '1D': { labels: ['9AM', '12PM', '3PM', '6PM', '9PM'], data: [598, 597, 599, 598.5, 599.5] },
                '1W': { labels: ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'], data: [590, 595, 592, 594, 597, 599.5] },
                '1M': { labels: ['W1', 'W2', 'W3', 'W4'], data: [580, 592, 588, 599.5] },
                '1Y': { labels: ['Mar 25', 'Jun 25', 'Sep 25', 'Dec 25', 'Mar 26'], data: [510, 535, 560, 585, 599.5] }
            };
            myChart.data.labels = dataMap[range].labels;
            myChart.data.datasets[0].data = dataMap[range].data;
            myChart.update();
            
            // UI Visual toggle
            document.querySelectorAll('button[onclick^="updateChartRange"]').forEach(btn => btn.classList.remove('bg-white', 'shadow-sm'));
            event.target.classList.add('bg-white', 'shadow-sm');
        }

        // --- Data Logic ---
        function addEntry() {
            const rawDate = document.getElementById('purchaseDate').value;
            const grams = parseFloat(document.getElementById('grams').value);
            const price = parseFloat(document.getElementById('price').value);
            const costs = parseFloat(document.getElementById('costs').value) || 0;
            
            if(!rawDate || !grams || !price) return alert("Please fill Date, Grams, and Price!");

            const selectedDate = new Date(rawDate);
            const totalCostPaid = (grams * price) + costs;
            const currentVal = grams * livePrice;
            const profitVal = currentVal - totalCostPaid;

            const entry = {
                id: Date.now(),
                dateStr: selectedDate.toLocaleDateString('en-GB'),
                day: selectedDate.toLocaleDateString('en-US', { weekday: 'long' }),
                grams: grams,
                buyPrice: price,
                makingCosts: costs,
                totalCost: totalCostPaid,
                currentValue: currentVal,
                netProfit: profitVal,
                prob: (livePrice / price).toFixed(2),
                posProb: ((profitVal / totalCostPaid) * 100).toFixed(1)
            };

            saveToLocal(entry);
            renderRow(entry);
            updateSummary();
            
            document.getElementById('grams').value = '';
            document.getElementById('price').value = '';
            document.getElementById('costs').value = '';
        }

        function renderRow(entry) {
            const colorClass = entry.netProfit >= 0 ? 'text-green-600' : 'text-red-600';
            const row = `
                <tr id="row-${entry.id}" class="hover:bg-gray-50 border-b">
                    <td class="p-4 font-medium">${entry.dateStr}</td>
                    <td class="p-4">${entry.day}</td>
                    <td class="p-4 text-center font-bold">${entry.grams}g</td>
                    <td class="p-4 text-center">QAR ${entry.totalCost.toLocaleString()}</td>
                    <td class="p-4 text-center">QAR ${entry.currentValue.toLocaleString()}</td>
                    <td class="p-4 text-center font-mono">${entry.prob}</td>
                    <td class="p-4 text-center font-bold ${colorClass}">${entry.posProb}%</td>
                    <td class="p-4 text-center font-bold ${colorClass}">QAR ${entry.netProfit.toLocaleString(undefined, {minimumFractionDigits: 2})}</td>
                    <td class="p-4 text-right no-pdf">
                        <button class="text-red-400 font-bold hover:text-red-600" onclick="deleteEntry(${entry.id})">Delete</button>
                    </td>
                </tr>`;
            document.getElementById('goldTable').insertAdjacentHTML('afterbegin', row);
        }

        function updateSummary() {
            let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
            let totalGrams = 0, totalInvested = 0;

            entries.forEach(e => {
                totalGrams += e.grams;
                totalInvested += e.totalCost;
            });

            const currentTotalValue = totalGrams * livePrice;
            const totalProfit = currentTotalValue - totalInvested;

            document.getElementById('statGrams').innerText = totalGrams.toFixed(2) + 'g';
            document.getElementById('statInvested').innerText = 'QAR ' + totalInvested.toLocaleString();
            document.getElementById('statProfit').innerText = 'QAR ' + totalProfit.toLocaleString();
            document.getElementById('statProfit').className = `text-2xl font-black ${totalProfit >= 0 ? 'text-green-600' : 'text-red-600'}`;
        }

        function saveToLocal(entry) {
            let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
            entries.push(entry);
            localStorage.setItem('goldEntries', JSON.stringify(entries));
        }

        function loadEntries() {
            document.getElementById('goldTable').innerHTML = '';
            let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
            entries.forEach(renderRow);
            updateSummary();
        }

        function deleteEntry(id) {
            if(!confirm("Are you sure you want to remove this entry?")) return;
            let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
            entries = entries.filter(e => e.id !== id);
            localStorage.setItem('goldEntries', JSON.stringify(entries));
            loadEntries();
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4'); // Landscape
            
            doc.setFontSize(20);
            doc.setTextColor(202, 138, 4); // Gold color
            doc.text("Gold Investment Report - Samir Al-Ashram", 14, 15);
            
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text(`Total Weight: ${document.getElementById('statGrams').innerText}`, 14, 25);
            doc.text(`Total Net Profit: ${document.getElementById('statProfit').innerText}`, 14, 30);
            doc.text(`Report Date: ${new Date().toLocaleString()}`, 14, 35);

            doc.autoTable({ 
                html: '#reportTable',
                startY: 40,
                theme: 'grid',
                headStyles: { fillColor: [202, 138, 4] },
                didParseCell: function(data) {
                    if (data.column.index === 8) data.cell.text = ''; // Hide Action column
                }
            });
            
            doc.save(`Gold_Portfolio_${new Date().toLocaleDateString()}.pdf`);
        }
    </script>
</body>
</html>
