<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samir's Gold Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        .app-viewport { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        .table-container { flex: 1; overflow-y: auto; }
        .table-container::-webkit-scrollbar { width: 8px; }
        .table-container::-webkit-scrollbar-track { background: #f1f1f1; }
        .table-container::-webkit-scrollbar-thumb { background: #ca8a04; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-100 font-sans text-gray-900">

    <div class="app-viewport">
        <header class="bg-yellow-600 text-white px-6 py-3 shadow-lg flex justify-between items-center shrink-0">
            <div>
                <h1 class="text-xl font-bold uppercase tracking-tight">Gold Investment Wallet</h1>
                <p class="text-yellow-100 text-[10px]">Live 24K Price (Qatar): <span class="font-bold">599.50 QAR/g</span></p>
            </div>
            <button onclick="downloadPDF()" class="bg-white text-yellow-700 px-5 py-1.5 rounded-lg font-bold shadow hover:bg-yellow-50 transition text-xs uppercase">Download PDF Report</button>
        </header>

        <div class="grid grid-cols-5 bg-white border-b shrink-0">
            <div class="border-r p-3 text-center">
                <p class="text-[9px] text-gray-500 uppercase font-bold">Purchases</p>
                <p id="statCount" class="text-xl font-black">0</p>
            </div>
            <div class="border-r p-3 text-center">
                <p class="text-[9px] text-gray-500 uppercase font-bold">Total Weight</p>
                <p id="statGrams" class="text-xl font-black">0.00g</p>
            </div>
            <div class="border-r p-3 text-center">
                <p class="text-[9px] text-gray-500 uppercase font-bold">Investment</p>
                <p id="statInvested" class="text-xl font-black">QAR 0</p>
            </div>
            <div id="cardValue" class="border-r p-3 text-center bg-gray-50">
                <p class="text-[9px] uppercase font-bold text-gray-500">Market Value</p>
                <p id="statValue" class="text-xl font-black">QAR 0</p>
            </div>
            <div id="cardProfit" class="p-3 text-center bg-gray-50">
                <p class="text-[9px] uppercase font-bold text-gray-500">Net Profit</p>
                <p id="statProfit" class="text-xl font-black">QAR 0</p>
            </div>
        </div>

        <div class="grid grid-cols-3 bg-white border-b h-[300px] shrink-0">
            <div class="col-span-2 border-r relative h-full">
                <div class="tradingview-widget-container h-full">
                    <div id="tradingview_live" class="h-full"></div>
                </div>
            </div>
            <div class="p-4 text-center">
                <h2 class="text-[10px] font-bold text-gray-700 uppercase tracking-widest mb-2">Portfolio Breakdown</h2>
                <div class="h-[220px] w-full"><canvas id="weightDonut"></canvas></div>
            </div>
        </div>

        <div class="bg-gray-50 p-3 border-b shrink-0 shadow-inner">
            <div class="flex gap-3 items-end">
                <div class="flex-1 min-w-[120px]">
                    <label class="text-[8px] font-bold uppercase text-gray-400 block mb-1">Date</label>
                    <input type="date" id="purchaseDate" class="w-full border p-1.5 rounded text-xs outline-none">
                </div>
                <div class="flex-1">
                    <label class="text-[8px] font-bold uppercase text-gray-400 block mb-1">Purity</label>
                    <select id="purity" class="w-full border p-1.5 rounded text-xs bg-white">
                        <option value="24">24K</option><option value="22">22K</option>
                        <option value="21">21K</option><option value="18">18K</option>
                    </select>
                </div>
                <div class="flex-1">
                    <label class="text-[8px] font-bold uppercase text-gray-400 block mb-1">Grams</label>
                    <input type="number" id="grams" placeholder="0.00" class="w-full border p-1.5 rounded text-xs">
                </div>
                <div class="flex-1">
                    <label class="text-[8px] font-bold uppercase text-gray-400 block mb-1">Price/g (QAR)</label>
                    <input type="number" id="price" placeholder="Rate" class="w-full border p-1.5 rounded text-xs">
                </div>
                <div class="flex-1">
                    <label class="text-[8px] font-bold uppercase text-gray-400 block mb-1">Making Cost</label>
                    <input type="number" id="costs" placeholder="Optional" class="w-full border p-1.5 rounded text-xs">
                </div>
                <button onclick="addEntry()" class="bg-yellow-600 text-white px-6 h-9 rounded font-bold hover:bg-yellow-700 transition uppercase text-[10px] shadow">Add Entry</button>
            </div>
        </div>

        <div class="table-container bg-white">
            <table class="w-full text-left border-collapse" id="reportTable">
                <thead class="bg-gray-100 text-gray-700 uppercase font-bold text-[9px] sticky top-0 z-10 shadow-sm">
                    <tr>
                        <th class="p-3 border-b">Date</th><th class="p-3 border-b">Type</th>
                        <th class="p-3 border-b text-center">Weight</th><th class="p-3 border-b text-center">Cost</th>
                        <th class="p-3 border-b text-center">Value</th><th class="p-3 border-b text-center">Return %</th>
                        <th class="p-3 border-b text-center">Profit (QAR)</th><th class="p-3 border-b text-right no-pdf">Action</th>
                    </tr>
                </thead>
                <tbody id="goldTable" class="divide-y text-[11px]"></tbody>
            </table>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const livePrice24K = 599.50;
        let donutChart;

        window.onload = function() {
            document.getElementById('purchaseDate').valueAsDate = new Date();
            
            // Initialize TradingView Widget
            new TradingView.widget({
                "autosize": true,
                "symbol": "TVC:GOLD",
                "interval": "D",
                "timezone": "Etc/UTC",
                "theme": "light",
                "style": "3",
                "locale": "en",
                "toolbar_bg": "#f1f3f6",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "hide_legend": false,
                "save_image": false,
                "container_id": "tradingview_live"
            });

            initLocalCharts();
            loadEntries();
        };

        function initLocalCharts() {
            const donutCtx = document.getElementById('weightDonut').getContext('2d');
            donutChart = new Chart(donutCtx, {
                type: 'doughnut',
                data: {
                    labels: ['24K', '22K', '21K', '18K'],
                    datasets: [{
                        data: [0, 0, 0, 0],
                        backgroundColor: ['#ca8a04', '#eab308', '#facc15', '#fef08a'],
                        borderWidth: 0
                    }]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    plugins: { legend: { position: 'bottom', labels: { boxWidth: 10, font: { size: 9 } } } },
                    cutout: '75%'
                }
            });
        }

        function addEntry() {
            const rawDate = document.getElementById('purchaseDate').value;
            const purity = parseInt(document.getElementById('purity').value);
            const grams = parseFloat(document.getElementById('grams').value) || 0;
            const price = parseFloat(document.getElementById('price').value) || 0;
            const costs = parseFloat(document.getElementById('costs').value) || 0;
            if(!rawDate || grams <= 0) return alert("Fill required data");

            const totalCost = (grams * price) + costs;
            const entry = { id: Date.now(), timestamp: new Date(rawDate).getTime(), dateStr: new Date(rawDate).toLocaleDateString('en-GB'), purity, grams, totalCost };
            let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
            entries.push(entry);
            localStorage.setItem('goldEntries', JSON.stringify(entries));
            loadEntries();
            document.getElementById('grams').value = '';
        }

        function loadEntries() {
            const tableBody = document.getElementById('goldTable');
            tableBody.innerHTML = '';
            let entries = JSON.parse(localStorage.getItem('goldEntries')) || [];
            const weights = { 24: 0, 22: 0, 21: 0, 18: 0 };
            let tGrams = 0, tCost = 0, tVal = 0;

            entries.sort((a, b) => b.timestamp - a.timestamp).forEach(e => {
                const currentVal = e.grams * (livePrice24K * (e.purity / 24));
                const profitVal = currentVal - e.totalCost;
                weights[e.purity] += e.grams;
                tGrams += e.grams; tCost += e.totalCost; tVal += currentVal;

                const color = profitVal >= 0 ? 'text-green-600' : 'text-red-600';
                tableBody.innerHTML += `<tr class="hover:bg-gray-50 border-b">
                    <td class="p-3">${e.dateStr}</td><td class="p-3 font-bold">${e.purity}K</td>
                    <td class="p-3 text-center font-bold">${e.grams}g</td><td class="p-3 text-center">${e.totalCost.toLocaleString()}</td>
                    <td class="p-3 text-center">${currentVal.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
                    <td class="p-3 text-center font-bold ${color}">${((profitVal/e.totalCost)*100).toFixed(1)}%</td>
                    <td class="p-3 text-center font-bold ${color}">${profitVal.toLocaleString(undefined, {maximumFractionDigits:0})}</td>
                    <td class="p-3 text-right"><button class="text-red-400 font-bold" onclick="deleteEntry(${e.id})">Del</button></td></tr>`;
            });

            document.getElementById('statCount').innerText = entries.length;
            document.getElementById('statGrams').innerText = tGrams.toFixed(2) + 'g';
            document.getElementById('statInvested').innerText = 'QAR ' + tCost.toLocaleString();
            document.getElementById('statValue').innerText = 'QAR ' + tVal.toLocaleString(undefined, {maximumFractionDigits:0});
            document.getElementById('statProfit').innerText = 'QAR ' + (tVal - tCost).toLocaleString(undefined, {maximumFractionDigits: 0});
            
            updateCardColors(tVal, tCost);
            donutChart.data.datasets[0].data = [weights[24], weights[22], weights[21], weights[18]];
            donutChart.update();
        }

        function updateCardColors(tVal, tCost) {
            const cardProfit = document.getElementById('cardProfit');
            if (tVal > tCost) cardProfit.className = "p-3 text-center bg-green-50 text-green-700";
            else if (tVal < tCost) cardProfit.className = "p-3 text-center bg-red-50 text-red-700";
        }

        function deleteEntry(id) { if(confirm("Remove?")) { let entries = JSON.parse(localStorage.getItem('goldEntries')) || []; entries = entries.filter(e => e.id !== id); localStorage.setItem('goldEntries', JSON.stringify(entries)); loadEntries(); } }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            doc.text("Gold Investment Report", 14, 15);
            doc.autoTable({ html: '#reportTable', startY: 20 });
            doc.save("Gold_Report.pdf");
        }
    </script>
</body>
</html>
